{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-4">
    <h2 class="text-2xl font-bold text-indigo-400 mb-6 italic">Sizning suhbatlaringiz</h2>
    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
        {% for contact in contacts %}
        <a href="{% url 'chat_room' contact.id %}" class="flex items-center p-4 hover:bg-slate-700 transition border-b border-slate-700 last:border-0">
            <div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center text-xl font-bold">
                {{ contact.nickname|slice:":1" }}
            </div>
            <div class="ml-4">
                <p class="font-bold text-slate-200">@{{ contact.nickname }}</p>
                <p class="text-sm text-slate-400">Suhbatni boshlash uchun bosing...</p>
            </div>
        </a>
        {% empty %}
        <p class="p-8 text-center text-slate-500">Hozircha hech qanday suhbat yo'q.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
