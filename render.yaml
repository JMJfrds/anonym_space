services:
  - type: web
    name: anonym-space-app
    env: docker
    dockerfilePath: Dockerfile
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: cd backend && sh start.sh
    envVars:
      - key: DATABASE_URL
        sync: false # Render'da PostgreSQL qo'shgandan so'ng URL'ni kiritasiz.
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "anonym-space-app.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://anonym-space-app.onrender.com"
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_NICKNAME
        value: "Admin"
